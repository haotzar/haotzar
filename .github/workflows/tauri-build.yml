name: Tauri Build (All Platforms)

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: install frontend dependencies
        run: npm install

      - name: download meilisearch
        run: npm run download:meilisearch

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this
          releaseName: 'האוצר v__VERSION__'
          releaseBody: 'בנייה אוטומטית של האוצר עבור ${{ matrix.platform }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz

      - name: upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      
      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      
      - name: install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
      
      - name: install frontend dependencies
        run: npm install
      
      - name: download meilisearch
        run: npm run download:meilisearch
      
      - name: check if Android project exists
        id: check_android
        run: |
          if [ -d "src-tauri/gen/android" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: init Android project (if not exists)
        if: steps.check_android.outputs.exists == 'false'
        run: npm run tauri android init -- --ci
      
      - name: build android
        run: npm run tauri android build -- --apk
      
      - name: upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: check if iOS build should run
        id: should_build_ios
        run: |
          if [ -n "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ APPLE_DEVELOPMENT_TEAM is set - iOS build will run"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ APPLE_DEVELOPMENT_TEAM is not set - skipping iOS build"
            echo "💡 To enable iOS builds, add APPLE_DEVELOPMENT_TEAM to repository secrets"
            echo "📚 See MOBILE-SETUP.md for instructions"
          fi
      
      - name: setup node
        if: steps.should_build_ios.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: install Rust stable
        if: steps.should_build_ios.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      
      - name: install frontend dependencies
        if: steps.should_build_ios.outputs.should_run == 'true'
        run: npm install
      
      - name: download meilisearch
        if: steps.should_build_ios.outputs.should_run == 'true'
        run: npm run download:meilisearch
      
      - name: check if iOS project exists
        if: steps.should_build_ios.outputs.should_run == 'true'
        id: check_ios
        run: |
          if [ -d "src-tauri/gen/apple" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: init iOS project (if not exists)
        if: steps.should_build_ios.outputs.should_run == 'true' && steps.check_ios.outputs.exists == 'false'
        run: npm run tauri ios init
      
      - name: build ios
        if: steps.should_build_ios.outputs.should_run == 'true'
        run: npm run tauri ios build
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      
      - name: upload IPA
        if: steps.should_build_ios.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: src-tauri/gen/apple/build/arm64/*.ipa
